name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /tmp && rm -rf pr-tax-app
            git clone --depth 1 https://github.com/brandoncheema-ops/pr-tax-app.git
            rm -f pr-tax-app/render.yaml pr-tax-app/render.json
            mkdir -p /opt/apps/pr-tax-app
            rsync -av --delete --exclude='.git' --exclude='venv' pr-tax-app/ /opt/apps/pr-tax-app/
            cd /opt/apps/pr-tax-app
            python3 -m venv venv 2>/dev/null || true
            source venv/bin/activate && pip install streamlit pandas -q
            [ -f requirements.txt ] && pip install -r requirements.txt -q
            deactivate
            pm2 restart pr-tax-app 2>/dev/null || pm2 start "/opt/apps/pr-tax-app/venv/bin/streamlit run app.py --server.port 8502 --server.baseUrlPath /pr-tax-app --server.headless true" --name pr-tax-app --cwd /opt/apps/pr-tax-app
            pm2 save && rm -rf /tmp/pr-tax-app
